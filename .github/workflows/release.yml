name: Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to release from"
        required: true
        default: "main"
        type: string
      release_type:
        description: "Version bump type"
        required: true
        default: "rc"
        type: choice
        options:
          - rc
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: |
          RELEASE_TYPE="${{ inputs.release_type }}"

          if [ "$RELEASE_TYPE" = "rc" ]; then
            npm version prerelease --preid=rc --no-git-tag-version
          else
            npm version "$RELEASE_TYPE" --no-git-tag-version
          fi

          VERSION=$(node -p "require('./manifest.json').version")
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: npm run build

      - name: Prepare release artifact
        run: |
          VERSION="${{ steps.bump.outputs.version }}"

          mkdir -p release/upload

          cp main.js release/upload/main.js
          cp manifest.json release/upload/manifest.json

          if [ -f styles.css ]; then
            cp styles.css release/upload/styles.css
          fi

          cd release/upload
          zip -r "../next-task-${VERSION}.zip" .
          cd ../..

      - name: Commit version bump
        run: |
          VERSION="${{ steps.bump.outputs.version }}"

          git add package.json manifest.json versions.json

          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          if git diff --cached --quiet; then
            echo "No version/build changes to commit."
            exit 1
          fi

          git commit -m "chore(release): ${VERSION}"

      - name: Create tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"

      - name: Push branch and tag
        run: |
          BRANCH="${{ inputs.branch }}"
          TAG="${{ steps.bump.outputs.tag }}"

          git push origin "HEAD:${BRANCH}"
          git push origin "${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          TAG="${{ steps.bump.outputs.tag }}"

          FLAGS=""

          if [[ "$VERSION" == *"-rc."* ]]; then
            FLAGS="$FLAGS --prerelease"
          fi

          ASSETS=(
            "release/next-task-${VERSION}.zip"
            "release/upload/main.js"
            "release/upload/manifest.json"
          )

          if [ -f release/upload/styles.css ]; then
            ASSETS+=("release/upload/styles.css")
          fi

          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Next Task ${VERSION}" \
            --notes "Release ${VERSION}" \
            $FLAGS